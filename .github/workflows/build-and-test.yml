name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-check:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Configure CMake
        run: cmake -B build -G "MinGW Makefiles"

      - name: Build project
        run: cmake --build build

      - name: Run unit tests
        run: ./build/algorithm_test.exe

      - name: Generate tables (accuracy_engine_simple)
        run: ./build/accuracy_engine_simple.exe

      - name: Verify output files exist and are non-empty
        shell: bash
        run: |
          cd build
          files=(
            "f_n20_table1.csv"
            "f_n20_table2.csv"
            "f_n20_errors.txt"
            "osc_n20_table1.csv"
            "osc_n20_table2.csv"
            "osc_n20_errors.txt"
            "phi_n4_table1.csv"
            "phi_n4_table2.csv"
            "phi_n4_errors.txt"
            "f_convergence.csv"
            "osc_convergence.csv"
          )
          for file in "${files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Error: $file is missing or empty"
              exit 1
            fi
          done
          echo "All output files present and non-empty."

      - name: Check phi(x) error threshold
        shell: bash
        run: |
          cd build
          max_err=$(grep "max |F - S|" phi_n4_errors.txt | awk '{print $NF}')
          threshold=1e-12
          if (( $(echo "$max_err > $threshold" | bc -l) )); then
            echo "Error: phi(x) spline error $max_err exceeds $threshold"
            exit 1
          fi
          echo "phi(x) error $max_err within acceptable range."
