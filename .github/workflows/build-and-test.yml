name: SukaTest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-check:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make

      - name: Configure CMake
        shell: msys2 {0}
        run: cmake -B build -G "MinGW Makefiles"

      - name: Build project
        shell: msys2 {0}
        run: cmake --build build

      - name: Run unit tests
        shell: msys2 {0}
        run: ./build/algorithm_test.exe

      - name: Generate tables (accuracy_engine_simple)
        shell: msys2 {0}
        run: ./build/accuracy_engine_simple.exe

      - name: Verify output files exist and are non-empty
        shell: msys2 {0}
        run: |
          cd build
          files=(
            "f_n20_table1.csv"
            "f_n20_table2.csv"
            "f_n20_errors.txt"
            "osc_n20_table1.csv"
            "osc_n20_table2.csv"
            "osc_n20_errors.txt"
            "phi_n4_table1.csv"
            "phi_n4_table2.csv"
            "phi_n4_errors.txt"
            "f_convergence.csv"
            "osc_convergence.csv"
          )
          for file in "${files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Error: $file is missing or empty"
              exit 1
            fi
          done
          echo "All output files present and non-empty."

      - name: Check phi(x) error threshold
        shell: msys2 {0}
        run: |
          cd build
          max_err=$(grep "max |F - S|" phi_n4_errors.txt | awk '{print $NF}')
          threshold=1e-12
          if (( $(echo "$max_err > $threshold" | bc -l) )); then
            echo "Error: phi(x) spline error $max_err exceeds $threshold"
            exit 1
          fi
          echo "phi(x) error $max_err within acceptable range."
